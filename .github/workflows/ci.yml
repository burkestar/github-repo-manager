name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting and linting only need to run once, on Linux.
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  # Build and test on every supported OS.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --all-targets
      - name: Test
        run: cargo test --locked
